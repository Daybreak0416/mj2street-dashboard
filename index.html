<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="apple-touch-icon" href="images/icons/icon.png">
    <link rel="icon" type="image/png" href="images/icons/icon.png">
    <link rel="manifest" href="manifest.json?v=1.1">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="마작2번가">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">
    <title>마작2번가 기록 앱</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #2d3436;
            --border: #dfe6e9;
            --accent: #0984e3;
            --danger: #d63031;
            --success: #00b894;
            --rank1-bg: rgba(241, 196, 15, 0.15);
            --rank4-bg: #f1f2f6;
        }

        body.dark-mode {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #dfe6e9;
            --border: #2d3436;
            --rank1-bg: rgba(241, 196, 15, 0.25);
            --rank4-bg: #2d2d2d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px 15px 80px;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            transition: 0.3s;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            border: 1px solid var(--border);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .player-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: flex-end;
        }

        .input-group {
            flex: 1;
        }

        .pos-label {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 4px;
            display: block;
        }

        input {
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--card);
            color: var(--text);
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
        }

            input[readonly] {
                cursor: pointer;
            }

        button {
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-main {
            background: var(--accent);
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .btn-save {
            background: var(--success);
            color: white;
            width: 100%;
            margin-top: 20px;
        }

        #member-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .modal-content {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: var(--card);
            border-radius: 20px 20px 0 0;
            padding: 25px;
            box-sizing: border-box;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        .member-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .member-btn {
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 10px;
        }

        .point-badge {
            padding: 8px 14px;
            border-radius: 10px;
            font-weight: 900;
            font-size: 1.0rem;
            background: rgba(128,128,128,0.1);
            font-family: 'Pretendard', sans-serif;
        }

        .pos {
            color: #00a8ff;
        }

        .neg {
            color: var(--danger);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            font-size: 0.75rem;
            color: #b2bec3;
            padding-bottom: 10px;
            text-align: center;
        }

        td {
            padding: 12px 5px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .rank-1 {
            background-color: var(--rank1-bg) !important;
        }

        .pos-rates-cell {
            font-size: 0.8rem;
            font-family: 'Pretendard', sans-serif;
            color: var(--success); /* 전체 승률과 동일한 색상 */
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .history-card {
            padding: 15px 5px;
            border-bottom: 1px solid var(--border);
        }

        .action-btn {
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 800;
            border: 1px solid transparent;
            cursor: pointer;
        }

            .action-btn.edit {
                background: rgba(9, 132, 227, 0.08);
                color: #004a99;
                border-color: #004a99;
            }

            .action-btn.delete {
                background: rgba(214, 48, 49, 0.08);
                color: #a10000;
                border-color: #a10000;
            }

        /* 다크모드 전용 설정 (body.dark-mode 클래스가 있을 때) */
        body.dark-mode .action-btn.edit {
            background: rgba(129, 236, 236, 0.1); /* 연한 민트/하늘색 배경 */
            color: #81ecec; /* 밝고 선명한 하늘색 */
            border-color: #81ecec;
        }

        body.dark-mode .action-btn.delete {
            background: rgba(255, 118, 117, 0.1); /* 연한 핑크 배경 */
            color: #ff7675; /* 밝은 코랄 레드 */
            border-color: #ff7675;
        }

        /* 다크모드에서 플레이어 점수 박스 가독성 추가 */
        body.dark-mode .history-player {
            background: #2d2d2d;
            border-color: #444;
            color: #eee;
        }
        .tile-container {
            display: flex;
            flex-wrap: wrap;
            gap: 4px; /* 패와 패 사이의 간격 */
            margin-top: 12px;
            background: #e0e0e0; /* 실제 마작판 느낌이 나도록 약간 어두운 배경 */
            padding: 12px;
            border-radius: 10px;
            justify-content: center;
            border: 1px solid rgba(0,0,0,0.1);
        }

        /* 개별 SVG 타일 스타일 */
        .tile-img {
            width: 30px; /* 패 크기 확대 */
            height: 42px; /* 패 크기 확대 */
            background: #fff;
            border: 1px solid #bbb;
            border-radius: 3px;
            margin-right: -2px; /* 음수 마진으로 패를 완전히 밀착 */
            display: inline-block;
            vertical-align: bottom;
            box-sizing: border-box;
            box-shadow: 1px 1px 0px rgba(0,0,0,0.1);
        }

        /* 눕힌 타일 (치, 퐁, 깡) */
        .tile-rotated {
            transform: rotate(-90deg) translateX(4px); /* 위치 보정 */
            transform-origin: center;
            margin: 0 6px; /* 눕혔을 때 옆 타일과 겹치지 않게 여백 확보 */
        }

        /* 울음 묶음 사이의 간격 */
        .meld-gap {
            display: inline-block;
            width: 8px;
        }
        function displayYaku(type) {
            const container = document.getElementById('yaku-content');
            const data = YAKU_DATA[type];
            if (!data) return;
            let html = '';
            data .forEach(yaku => {
        let tileHtml = '<div class="tile-container">';
        
        yaku.tiles.forEach(tileKey => {
            if (tileKey === "gap") {
                tileHtml += `<span class="meld-gap"></span>`;
            } else if (tileKey.endsWith("_r")) {
                // _r로 끝나면 눕힌 타일 클래스 추가
                const realTile = tileKey.replace("_r", "");
                tileHtml += `<img src="images/yaku/${realTile}.svg" class="tile-img tile-rotated">`;
            } else {
                tileHtml += `<img src="images/yaku/${tileKey}.svg" class="tile-img">`;
            }
        });
        
        tileHtml += '</div>';

        html += `
            <div class="card" style="margin-bottom:15px;">
                <h3 style="margin:0 0 10px 0; color:var(--accent);">${yaku.name}</h3>
                <p style="font-size:0.9rem; margin-bottom:12px;">${yaku.text}</p>
                ${tileHtml}
            </div>
        `;
    });
            container .innerHTML = html;
        }
        body.dark-mode .tile-img {
            background: #fdfdfd; /* 약간 차분한 흰색 */
            border-color: #444; /* 어두운 곳에선 외곽선을 조금 더 진하게 */
            box-shadow: 1px 2px 0px rgba(0,0,0,0.4);
        }
        .tile-img:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        /* 다크모드일 때 타일 배경 최적화 */
        body.dark-mode .tile-container {
            background: #1a1a1a; /* 다크모드에선 매트한 검정 느낌 */
        }
        .han {
            font-size: 1.1rem;
            font-weight: bold;
            color: #e74c3c; /* 빨간색 계열 */
            margin-left: 8px;
            padding: 2px 6px;
            background: rgba(231, 76, 60, 0.1);
            border-radius: 4px;
        }

        /* 멘젠 한정 스타일 */
        .menzen {
            font-size: 0.75rem;
            color: #3498db; /* 파란색 계열 */
            border: 1px solid #3498db;
            padding: 1px 4px;
            border-radius: 3px;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div id="main-page">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <button onclick="toggleDarkMode()" style="width:48px; height:48px; background:var(--card); border:1px solid var(--border); border-radius: 14px; padding:0;">🌓</button>
            <h2 style="margin:0;">📊 마작2번가</h2>
            <button onclick="showYakuPage()" style="width:48px; height:48px; background:var(--card); border:1px solid var(--border); border-radius: 14px; padding:0; font-weight:bold; font-size:0.9rem; color:var(--accent);">役</button>
        </div>
        <div class="card" style="overflow-x: auto; padding: 15px 5px;">
            <table>
                <thead><tr><th>이름</th><th>대국</th><th>승률</th><th>평균</th><th>자리별 승률</th><th>총점</th></tr></thead>
                <tbody id="total-rank-body"></tbody>
            </table>
        </div>
        <button class="btn-main" onclick="showInputPage()">📜 새로운 기록 입력</button>
        <h3 style="margin: 30px 5px 15px;">📜 최근 게임</h3>
        <div id="history-list" class="card"></div>
    </div> <div id="yaku-page" style="display:none;">
        <button style="background:var(--border); color:var(--text); margin-bottom:15px;" onclick="showMainPage()">← 뒤로가기</button>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <button class="btn-main" onclick="displayYaku('jp')" style="margin-top:0; flex:1;">일본룰 역</button>
            <button class="btn-main" onclick="displayYaku('int')" style="margin-top:0; background:#6c5ce7; flex:1;">국제룰 역</button>
        </div>
        <div id="yaku-content" style="min-height: 300px;">
            <div class="card" style="text-align:center; opacity:0.5; padding:100px 20px;">룰을 선택해 주세요.</div>
        </div>
    </div>

    <div id="input-page" style="display:none;">
        <button style="background:var(--border); color:var(--text); margin-bottom:15px;" onclick="showMainPage()">← 뒤로가기</button>
        <div class="card">
            <div id="guide-msg" style="text-align:center; font-weight:800; margin-bottom:20px;">점수를 입력하세요</div>
            <div id="inputs"></div>
            <div style="margin-top:15px; display:flex; justify-content:space-between; align-items:center; padding: 0 10px;">
                <span style="font-weight:700; opacity:0.6;">공탁 리치봉 (개당 1,000점)</span>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="number"
                           inputmode="numeric"
                           id="pot"
                           value="0"
                           step="1"
                           oninput="calculate()"
                           onfocus="if(this.value==='0') this.value='';"
                           onblur="if(this.value==='') this.value='0';"
                           style="width:70px; text-align: center;">
                    <span style="font-weight:700;">개</span>
                </div>
            </div>
        </div>
        <div class="card" style="background: #2d3436; color: white;">
            <table style="color: white;"><tbody id="realtime-rank-body"></tbody></table>
            <button id="save-button" class="btn-save" onclick="saveRecord()">결과 저장 및 종료</button>
        </div>
    </div>

    <div id="member-modal" onclick="closeMemberModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin:0;">멤버 선택</h3>
            <div class="member-grid" id="member-buttons"></div>
            <button onclick="closeMemberModal()" style="width:100%; background:var(--bg); color:var(--text); border:1px solid var(--border);">취소</button>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "admin0416";
        const UMA = [30, 10, -10, -30], START_SCORE = 25000, RETURN_SCORE = 30000, TOTAL_TARGET = 100000;
        const MEMBER_LIST = ["양주하", "남유성", "최봉민", "용희준"];

        // 핵심: 절대 history라는 이름을 전역 변수로 쓰지 않음
        window.gameHistory = [];
        let editIndex = -1, currentCalcedResult = null, activeInputIndex = -1;

        function checkAuth() {
            const savedPw = localStorage.getItem('mj_auth_key');
            if (savedPw === ADMIN_PASSWORD) return true;

            const inputPw = prompt("관리자 비밀번호를 입력해주세요 (최초 1회):");
            if (inputPw === ADMIN_PASSWORD) {
                localStorage.setItem('mj_auth_key', inputPw);
                return true;
            }
            alert("권한이 없습니다.");
            return false;
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('mjDarkMode', document.body.classList.contains('dark-mode'));
        }
        if (localStorage.getItem('mjDarkMode') === 'true') document.body.classList.add('dark-mode');

        function renderInputRows() {
            const container = document.getElementById('inputs');
            const positions = ["東 (동가)", "南 (남가)", "西 (서가)", "北 (북가)"];
            container.innerHTML = positions.map((pos, i) => `
                <div class="player-row">
                    <div class="input-group">
                        <span class="pos-label">${pos}</span>
                        <input type="text" class="p-name" placeholder="선택" readonly onclick="openMemberModal(${i})">
                    </div>
                    <div class="input-group" style="flex: 1.2;">
                        <input type="number" inputmode="numeric" class="p-score" placeholder="점수" oninput="calculate()">
                    </div>
                </div>`).join('');
        }

        function openMemberModal(index) {
            activeInputIndex = index;
            const container = document.getElementById('member-buttons');
            container.innerHTML = MEMBER_LIST.map(name => `<button class="member-btn" onclick="selectMember('${name}')">${name}</button>`).join('');
            document.getElementById('member-modal').style.display = 'block';
        }
        function closeMemberModal() { document.getElementById('member-modal').style.display = 'none'; }
        function selectMember(name) {
            document.querySelectorAll('.p-name')[activeInputIndex].value = name;
            closeMemberModal(); calculate();
        }

        function showInputPage(index = -1) {
            editIndex = index;
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('yaku-page').style.display = 'none'; // 추가
            document.getElementById('input-page').style.display = 'block';
            renderInputRows();
            if (index !== -1) {
                const ns = document.querySelectorAll('.p-name'), ss = document.querySelectorAll('.p-score');
                window.gameHistory[index].rawScores.forEach((s, i) => {
                    if(ns[i]) ns[i].value = s.name;
                    if(ss[i]) ss[i].value = s.score;
                });
                document.getElementById('pot').value = window.gameHistory[index].pot/1000 || 0;
            }
            calculate();
        }

        function calculate() {
            const ns = document.querySelectorAll('.p-name'), ss = document.querySelectorAll('.p-score');
            const potCount = parseInt(document.getElementById('pot').value) || 0;
            const potScore = potCount * 1000;
            const guide = document.getElementById('guide-msg'), resultBody = document.getElementById('realtime-rank-body'), saveBtn = document.getElementById('save-button');
            let filled = [], emptyIdx = -1, sum = potScore;
            ss.forEach((s, i) => {
                const v = parseInt(s.value);
                if(!isNaN(v)) { filled.push({name:ns[i].value, score:v, idx:i}); sum += v; }
                else emptyIdx = i;
            });
            let calcData = [...filled];
            if(filled.length === 3 && ns[emptyIdx].value !== "") {
                const needed = TOTAL_TARGET - sum;
                guide.innerText = `자동계산: ${needed.toLocaleString()}점`;
                calcData.push({name: ns[emptyIdx].value, score: needed, idx: emptyIdx});
            } else if(filled.length === 4) {
                const diff = TOTAL_TARGET - sum;
                guide.innerText = diff === 0 ? "✅ 점수 일치" : `⚠️ ${Math.abs(diff).toLocaleString()}점 오차`;
            }
            const ready = calcData.length === 4 && calcData.every(p => p.name !== "") && (sum === TOTAL_TARGET || filled.length === 3);
            saveBtn.disabled = !ready; saveBtn.style.opacity = ready ? "1" : "0.2";
            if(!ready) { resultBody.innerHTML = "<tr><td colspan='3'>이름과 점수를 모두 입력하세요</td></tr>"; return; }
            const sortedData = [...calcData].sort((a,b) => b.score - a.score);
            resultBody.innerHTML = "";
            currentCalcedResult = { rawScores: calcData.sort((a,b)=>a.idx-b.idx), pot: potScore, calculated: [] };
            let rank = 0, groups = [];
            sortedData.forEach(p => {
                if(groups.length > 0 && groups[groups.length-1][0].score === p.score) groups[groups.length-1].push(p);
                else groups.push([p]);
            });
            groups.forEach(g => {
                let umaSum = 0; for(let i=0; i<g.length; i++) umaSum += UMA[rank + i];
                let bonus = (rank === 0) ? (((RETURN_SCORE-START_SCORE)*4)+potScore)/1000/g.length : 0;
                g.forEach(p => {
                    let pt = ((p.score - RETURN_SCORE)/1000) + (umaSum/g.length) + bonus;
                    currentCalcedResult.calculated.push({name: p.name, point: pt});
                    resultBody.innerHTML += `<tr><td>${rank+1}위</td><td>${p.name}</td><td><span class="point-badge ${pt>=0?'pos':'neg'}">${pt.toFixed(1)}</span></td></tr>`;
                });
                rank += g.length;
            });
        }

        async function saveRecord() {
            if(!currentCalcedResult) return;
            if(!checkAuth()) return;
            const saveBtn = document.getElementById('save-button');
            saveBtn.disabled = true; saveBtn.innerText = "저장 중...";
            const record = {
                date: editIndex === -1 ? new Date().toLocaleString() : window.gameHistory[editIndex].date,
                rawScores: currentCalcedResult.rawScores,
                pot: currentCalcedResult.pot,
                results: currentCalcedResult.calculated,
                timestamp: window.firebaseTimestamp ? window.firebaseTimestamp() : new Date()
            };
            try {
                if(editIndex === -1) await window.firebaseAdd(window.firebaseCollection(window.db, "games"), record);
                else await window.firebaseUpdate(window.firebaseDoc(window.db, "games", window.gameHistory[editIndex].firebaseId), record);
                alert("저장되었습니다.");
                if (window.fetchHistoryFromFirebase) await window.fetchHistoryFromFirebase();
                showMainPage();
            } catch (e) { alert("저장 실패: " + e.message); }
            finally { saveBtn.disabled = false; saveBtn.innerText = "결과 저장 및 종료"; }
        }

        function renderTotalRanking() {
            const stats = {};
            const positions = ["東", "南", "西", "北"];
            if(!window.gameHistory) return;

            window.gameHistory.forEach(m => {
                const maxPoint = Math.max(...m.results.map(r => r.point));
                const winners = m.results.filter(r => r.point === maxPoint).map(r => r.name);

                m.results.forEach(p => {
                    if (!stats[p.name]) {
                        stats[p.name] = { total: 0, count: 0, ranks: [], wins: 0, posWins: { "東": 0, "南": 0, "西": 0, "北": 0 }, posCounts: { "東": 0, "南": 0, "西": 0, "北": 0 } };
                    }
                    const s = stats[p.name];
                    const playerRaw = m.rawScores.find(r => r.name === p.name);
                    const pos = playerRaw ? positions[playerRaw.idx] : null;

                    s.total += p.point;
                    s.count++;
                    const r = [...m.results].sort((a,b) => b.point - a.point).findIndex(x => x.name === p.name) + 1;
                    s.ranks.push(r);
                    if (pos) {
                        s.posCounts[pos]++;
                        if (winners.includes(p.name)) { s.wins++; s.posWins[pos]++; }
                    }
                });
            });

            const names = Object.keys(stats).sort((a,b) => stats[b].total - stats[a].total);
            document.getElementById('total-rank-body').innerHTML = names.map((n, i) => {
                const s = stats[n];
                const posRates = positions.map(p => s.posCounts[p] > 0 ? Math.round((s.posWins[p] / s.posCounts[p]) * 100) + '%' : '-').join(' / ');

                return `<tr class="${i === 0 ? 'rank-1' : ''}">
            <td style="font-weight:700;">${i===0?'👑 ':''}${n}</td>
            <td>${s.count}</td>

            <td><span class="point-badge ${s.total>=0?'pos':'neg'}">${s.total.toFixed(1)}</span></td>
        </tr>`;
            }).join('');
        }

        function renderHistoryList() {
            const list = document.getElementById('history-list');
            if(!window.gameHistory || !window.gameHistory.length) {
                list.innerHTML = "<div style='text-align:center; opacity:0.5; padding:40px;'>기록이 없습니다.</div>";
                return;
            }
            list.innerHTML = window.gameHistory.map((m, i) => `
        <div class="history-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <span style="font-size:0.75rem; opacity:0.5; font-weight:600;">${m.date}</span>
                <div style="display:flex; gap:8px;">
                    <div class="action-btn edit" onclick="showInputPage(${i})">수정</div>
                    <div class="action-btn delete" onclick="deleteRecord(${i})">삭제</div>
                </div>
            </div>
            <div style="display:flex; flex-wrap:wrap; gap:8px;">
                ${m.results.map(r => `
                    <div style="background:var(--bg); padding:6px 12px; border-radius:10px; border:1px solid var(--border); font-size:0.85rem; font-weight:600;">
                        ${r.name} <b class="${r.point>=0?'pos':'neg'}" style="margin-left:4px;">${r.point.toFixed(1)}</b>
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');
        }

        function showMainPage() {
            document.getElementById('main-page').style.display = 'block';
            document.getElementById('input-page').style.display = 'none';
            document.getElementById('yaku-page').style.display = 'none';
            if(window.renderTotalRanking) renderTotalRanking(); 
            if(window.renderHistoryList) renderHistoryList();
        }

        function showYakuPage() {
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('input-page').style.display = 'none';
            document.getElementById('yaku-page').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function displayYaku(type) {
            const container = document.getElementById('yaku-content');
            const data = YAKU_DATA[type];
            if (!data) return;

            let html = '';
            data.forEach(yaku => {
                let tileHtml = '<div class="tile-container">';
        
                yaku.tiles.forEach(tileKey => {
                    if (tileKey === "gap") {
                        tileHtml += `<span class="meld-gap"></span>`;
                    } else if (tileKey.endsWith("_r")) {
                        // _r로 끝나면 눕힌 타일 클래스 추가
                        const realTile = tileKey.replace("_r", "");
                        tileHtml += `<img src="images/yaku/${realTile}.svg" class="tile-img tile-rotated">`;
                    } else {
                        tileHtml += `<img src="images/yaku/${tileKey}.svg" class="tile-img">`;
                    }
                });
        
                tileHtml += '</div>';

                html += `
            <div class="card" style="margin-bottom:15px;">
                <h3 style="margin:0 0 10px 0; color:var(--accent);">${yaku.name}</h3>
                <p style="font-size:0.9rem; margin-bottom:12px;">${yaku.text}</p>
                ${tileHtml}
            </div>
        `;
            });
            container.innerHTML = html;
        }
        window.onload = showMainPage;
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA3F2mbGoPwaVLv4ApY0Q6kTKJ5a1DMnOo",
            authDomain: "mahjong2street.firebaseapp.com",
            projectId: "mahjong2street",
            storageBucket: "mahjong2street.firebasestorage.app",
            messagingSenderId: "1025761333129",
            appId: "1:1025761333129:web:6cf1b80462d48b5d089b58"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
        window.firebaseCollection = collection;
        window.firebaseAdd = addDoc;
        window.firebaseGet = getDocs;
        window.firebaseQuery = query;
        window.firebaseOrder = orderBy;
        window.firebaseTimestamp = serverTimestamp;
        window.firebaseDoc = doc;
        window.firebaseUpdate = updateDoc;
        window.firebaseDelete = deleteDoc;

        window.fetchHistoryFromFirebase = async function() {
            try {
                const q = query(collection(db, "games"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                const list = [];
                querySnapshot.forEach((doc) => {
                    list.push({ firebaseId: doc.id, ...doc.data() });
                });
                window.gameHistory = list;
                renderTotalRanking();
                renderHistoryList();
                console.log("로드 완료:", list.length);
            } catch (e) { console.error("Firebase 로드 실패:", e); }
        };

        // 지연 실행으로 정의 시점 보장
        setTimeout(() => { window.fetchHistoryFromFirebase(); }, 500);
    </script>
    <script>
if ('serviceWorker' in navigator) {
    // 1. 서비스 워커 등록 및 업데이트 체크
    navigator.serviceWorker.register('sw.js').then((reg) => {
      console.log('서비스 워커 등록 성공');

      // 주기적으로 서버의 새 버전 체크
      reg.update();

      reg.onupdatefound = () => {
        const installingWorker = reg.installing;
        installingWorker.onstatechange = () => {
          if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // 새 버전이 설치되면 자동 새로고침
            window.location.reload();
          }
        };
      };
    });

    // 2. 컨트롤러 변경 시 새로고침
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      window.location.reload();
    });
  }</script>
